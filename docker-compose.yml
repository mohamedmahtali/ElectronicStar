services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: electronic_star
      POSTGRES_USER: app
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d electronic_star"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 12

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/web:/app/apps/web
      - ./libs:/app/libs

  crawler:
    build:
      context: .
      dockerfile: deploy/docker/crawler.Dockerfile
    env_file: .env
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./apps/crawler:/app/apps/crawler
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs

  crawler-scheduler-materiel:
    build:
      context: .
      dockerfile: deploy/docker/crawler.Dockerfile
    env_file: .env
    profiles:
      - scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command:
      - python
      - -m
      - apps.crawler.scripts.scheduler
      - --merchant
      - materiel
      - --interval-minutes
      - ${CRAWLER_MATERIEL_INTERVAL_MINUTES:-60}
      - --itemcount
      - ${CRAWLER_MATERIEL_ITEMCOUNT:-20}
      - --output-dir
      - /app/apps/crawler/scheduled
      - --log-level
      - ${CRAWLER_LOG_LEVEL:-INFO}
      - --request-queue
      - ${CRAWLER_MATERIEL_REQUEST_QUEUE:-crawler:run_requests:materiel}
      - --request-poll-seconds
      - ${CRAWLER_REQUEST_POLL_SECONDS:-5}
      - --ingest
    volumes:
      - ./apps/crawler:/app/apps/crawler
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs

  crawler-scheduler-ldlc:
    build:
      context: .
      dockerfile: deploy/docker/crawler.Dockerfile
    env_file: .env
    profiles:
      - scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command:
      - python
      - -m
      - apps.crawler.scripts.scheduler
      - --merchant
      - ldlc
      - --interval-minutes
      - ${CRAWLER_LDLC_INTERVAL_MINUTES:-60}
      - --itemcount
      - ${CRAWLER_LDLC_ITEMCOUNT:-20}
      - --output-dir
      - /app/apps/crawler/scheduled
      - --log-level
      - ${CRAWLER_LOG_LEVEL:-INFO}
      - --request-queue
      - ${CRAWLER_LDLC_REQUEST_QUEUE:-crawler:run_requests:ldlc}
      - --request-poll-seconds
      - ${CRAWLER_REQUEST_POLL_SECONDS:-5}
      - --ingest
    volumes:
      - ./apps/crawler:/app/apps/crawler
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs

  pushgateway:
    image: prom/pushgateway:v1.10.0
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    depends_on:
      - pushgateway
      - api

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  esdata:
  promdata:
  grafanadata:
